<!doctype html>
<html lang="ar" dir="rtl">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر شوق</title>
  <style>

body{
margin:0;
font-family:Tahoma;
background:#111;
color:white;
text-align:center;
}

header{
padding:40px 20px;
background:linear-gradient(45deg,#000,#222);
}

header h1{
font-size:40px;
margin:10px 0;
}

header p{
color:#ccc;
}

.store-img{
width:100%;
max-height:350px;
object-fit:cover;
}

.products{
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1b1b1b;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,.4);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:15px 0;
}

.btn{
display:inline-block;
margin:30px;
padding:15px 35px;
background:#25D366;
color:white;
font-size:20px;
text-decoration:none;
border-radius:10px;
transition:.3s;
}

.btn:hover{
background:#1ebe5d;
}

.price{
color:#25D366;
font-size:18px;
font-weight:bold;
margin:10px 0;
}

.quantity-control{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:10px 0;
}

.qty-btn{
background:#333;
border:none;
color:white;
width:30px;
height:30px;
border-radius:5px;
cursor:pointer;
transition:.2s;
}

.qty-btn:hover{
background:#444;
}

.add-to-cart{
background:#ff9800;
border:none;
color:white;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
transition:.3s;
margin-bottom:10px;
width:90%;
}

.add-to-cart:hover{
background:#e68900;
}

.cart-section{
margin:30px 20px;
padding:20px;
background:#1b1b1b;
border-radius:15px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.cart-items{
text-align:right;
margin:15px 0;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px;
background:#2a2a2a;
margin:5px 0;
border-radius:8px;
}

.cart-total{
font-size:18px;
font-weight:bold;
color:#25D366;
margin:15px 0;
padding:15px;
border-top:2px solid #333;
}

.order-btn{
background:#25D366;
width:100%;
padding:15px;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.order-btn:hover{
background:#1ebe5d;
}

.empty-cart{
color:#aaa;
padding:20px;
}

footer{
padding:20px;
color:#aaa;
}

</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <header>
   <h1>متجر شوق</h1>
   <p>حلويات فاخرة للمناسبات</p>
  </header><img class="store-img" src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&amp;fit=crop" alt="متجر شوق" loading="lazy">
  <section class="products">
   <h2>منتجاتنا</h2>
   <div class="grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&amp;h=300&amp;fit=crop" alt="هريسة" loading="lazy">
     <h3>هريسة</h3>
     <p class="price">50 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('haresa', -1)">−</button> <span id="qty-haresa">1</span> <button class="qty-btn" onclick="updateQty('haresa', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('هريسة', 50, 'haresa')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1599599810694-b5ac4dd0b7a0?w=400&amp;h=300&amp;fit=crop" alt="رز بحليب" loading="lazy">
     <h3>رز بحليب</h3>
     <p class="price">45 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('roz', -1)">−</button> <span id="qty-roz">1</span> <button class="qty-btn" onclick="updateQty('roz', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('رز بحليب', 45, 'roz')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1585080500935-71b51c63ed39?w=400&amp;h=300&amp;fit=crop" alt="معمول" loading="lazy">
     <h3>معمول</h3>
     <p class="price">60 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('ma3mul', -1)">−</button> <span id="qty-ma3mul">1</span> <button class="qty-btn" onclick="updateQty('ma3mul', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('معمول', 60, 'ma3mul')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=400&amp;h=300&amp;fit=crop" alt="بوكس حلويات" loading="lazy">
     <h3>بوكس حلويات</h3>
     <p class="price">120 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('box', -1)">−</button> <span id="qty-box">1</span> <button class="qty-btn" onclick="updateQty('box', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('بوكس حلويات', 120, 'box')">أضف للسلة</button>
    </div>
   </div>
   <div class="cart-section">
    <h2>🛒 سلة التسوق</h2>
    <div id="cart-items" class="cart-items">
     <p class="empty-cart">السلة فارغة</p>
    </div>
    <div class="cart-total">
     الإجمالي: <span id="total">0</span> ريال
    </div><button class="order-btn" onclick="sendOrder()" id="order-btn" style="display:none;"> إرسال الطلب عبر واتساب </button>
   </div>
  </section>
  <footer>
   © متجر شوق
  </footer>
  <script>
    let cart = {};
    let quantities = {
      haresa: 1,
      roz: 1,
      ma3mul: 1,
      box: 1
    };

    function updateQty(product, change) {
      quantities[product] += change;
      if (quantities[product] < 1) quantities[product] = 1;
      document.getElementById('qty-' + product).textContent = quantities[product];
    }

    function addToCart(name, price, id) {
      const qty = quantities[id];
      if (cart[id]) {
        cart[id].qty += qty;
      } else {
        cart[id] = { name, price, qty };
      }
      quantities[id] = 1;
      document.getElementById('qty-' + id).textContent = '1';
      updateCartDisplay();
    }

    function updateCartDisplay() {
      const cartItems = document.getElementById('cart-items');
      const total = document.getElementById('total');
      const orderBtn = document.getElementById('order-btn');

      if (Object.keys(cart).length === 0) {
        cartItems.innerHTML = '<p class="empty-cart">السلة فارغة</p>';
        total.textContent = '0';
        orderBtn.style.display = 'none';
        return;
      }

      let html = '';
      let totalPrice = 0;

      for (let id in cart) {
        const item = cart[id];
        const itemTotal = item.price * item.qty;
        totalPrice += itemTotal;
        html += `
          <div class="cart-item">
            <button onclick="removeFromCart('${id}')" style="background:#d32f2f; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">حذف</button>
            <span>${item.qty} × ${item.price} ريال = ${itemTotal} ريال</span>
            <span>${item.name}</span>
          </div>
        `;
      }

      cartItems.innerHTML = html;
      total.textContent = totalPrice;
      orderBtn.style.display = 'block';
    }

    function removeFromCart(id) {
      delete cart[id];
      updateCartDisplay();
    }

    function sendOrder() {
      let message = 'طلبي من متجر شوق:%0A%0A';
      let total = 0;

      for (let id in cart) {
        const item = cart[id];
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        message += `${item.name} - ${item.qty} × ${item.price} ريال = ${itemTotal} ريال%0A`;
      }

      message += `%0A----%0Aالإجمالي: ${total} ريال`;
      window.open(`https://wa.me/966533175212?text=${message}`);
    }
  </script>
