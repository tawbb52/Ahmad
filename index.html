<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B52 Store</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
direction:rtl;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#020617;
}

header a{
color:white;
text-decoration:none;
margin:0 10px;
}

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:45px;
}

.btn{
background:#22c55e;
padding:12px 25px;
border-radius:6px;
text-decoration:none;
color:white;
}

.products{
display:flex;
justify-content:center;
gap:20px;
padding:60px;
flex-wrap:wrap;
}

.product{
background:#1e293b;
padding:25px;
border-radius:10px;
width:220px;
text-align:center;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}
</style>

</head>

<body>

<header>
<h2>B52 Store</h2>

<nav>
<a href="#">الرئيسية</a>
<a href="#">المنتجات</a>
<a href="#">الأسعار</a>
<a href="#">تواصل معنا</a>
</nav>
</header>

<section class="hero">
<h1>مرحبا بكم في B52 Store</h1>
<p>أفضل متجر للبطاقات والخدمات الرقمية</p>

<a class="btn" href="#">تسوق الآن</a>
</section>

<section class="products">

<div class="product">
<h3>بطاقة رقمية</h3>
<p>شراء البطاقات بسهولة</p>
</div>

<div class="product">
<h3>خدمات أونلاين</h3>
<p>أفضل الخدمات الرقمية</p>
</div>

<div class="product">
<h3>الدفع السريع</h3>
<p>طرق دفع متعددة وآمنة</p>
</div>

</section>

<footer>
<p>© 2026 B52 Store</p>
</footer>

</body>
</html>
