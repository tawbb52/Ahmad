<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر احمد العنزي الرقمي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; background:#f9fafb; }
  </style>
</head>
<body>

  <div class="max-w-3xl mx-auto p-5">
    <h1 class="text-3xl font-bold text-center mb-6">متجر احمد العنزي الرقمي</h1>

    <div class="grid gap-4">

      <div class="bg-white rounded-2xl p-5 shadow border">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-xl font-bold">تطبيقات بلس</h2>
            <p class="text-gray-500">اشتراك سنوي لأفضل التطبيقات</p>
            <p class="text-green-600 font-bold mt-2">45 ر.س</p>
          </div>
          <button onclick="orderNow('تطبيقات بلس', 45)"
            class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-xl font-bold">
            اطلب
          </button>
        </div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow border">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-xl font-bold">شاهد VIP مسلسلات</h2>
            <p class="text-gray-500">آلاف المسلسلات والأفلام</p>
            <p class="text-green-600 font-bold mt-2">8 ر.س</p>
          </div>
          <button onclick="orderNow('شاهد VIP مسلسلات', 8)"
            class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-xl font-bold">
            اطلب
          </button>
        </div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow border">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-xl font-bold">نتفلكس ملف خاص</h2>
            <p class="text-gray-500">ملف خاص بك</p>
            <p class="text-green-600 font-bold mt-2">18 ر.س</p>
          </div>
          <button onclick="orderNow('نتفلكس ملف خاص', 18)"
            class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-xl font-bold">
            اطلب
          </button>
        </div>
      </div>

    </div>

    <div class="text-center mt-8">
      <a href="https://wa.me/966504106065" target="_blank"
        class="inline-block bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl font-bold">
        زر واتساب
      </a>
    </div>
  </div>

  <script>
    function orderNow(productName, price) {
      const phone = "966504106065";
      const message = `السلام عليكم، أريد طلب:
المنتج: ${productName}
السعر: ${price} ريال`;
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    }
  </script>

</body>
</html>
