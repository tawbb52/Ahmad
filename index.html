<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متجر أحمد العنزي</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      color: #222;
      text-align: center;
    }
    .box {
      max-width: 520px;
      margin: 60px auto;
      background: #fff;
      padding: 32px 24px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-bottom: 10px;
      font-size: 30px;
    }
    p {
      line-height: 1.8;
      color: #555;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 26px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
    }
    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #777;
    }
    .contact {
      margin-top: 24px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>متجر أحمد العنزي</h1>
    <p>
      أهلاً بك في صفحة التثبيت الخاصة بتطبيقاتنا.
      اضغط الزر أدناه لتثبيت التطبيق المتاح بشكل رسمي.
    </p>

    <a class="btn" href="itms-services://?action=download-manifest&url=https://example.com/manifest.plist">
      تثبيت التطبيق
    </a>

    <div class="note">
      يلزم فتح الصفحة من iPhone أو iPad، ويجب أن يكون رابط التثبيت عبر HTTPS.
    </div>

    <div class="contact">
      للتواصل: واتساب 0504106065
    </div>
  </div>
</body>
</html>
