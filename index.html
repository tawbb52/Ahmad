<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>רכישה מהירה</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      line-height: 1.7;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      background: #1a1a1a;
      padding: 32px 20px;
    }

    .card {
      background: #222;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      color: #ffffff;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: 18px;
      color: #d8d8d8;
      margin-bottom: 28px;
    }

    .info {
      background: #2a2a2a;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 24px;
      color: #f1f1f1;
      font-size: 17px;
    }

    .button-area {
      margin-top: 24px;
    }

    .buy-btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #99C7BB;
      color: #0b3c3b;
      font-size: 28px;
      font-weight: 700;
      padding: 22px 18px;
      border-radius: 20px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .buy-btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .note {
      text-align: center;
      color: #bdbdbd;
      font-size: 14px;
      margin-top: 18px;
    }

    .footer {
      text-align: center;
      color: #8f8f8f;
      font-size: 13px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>רכישה מהירה ובטוחה</h1>
      <div class="subtitle">המשיכו לעמוד התשלום כדי להשלים את ההזמנה</div>

      <div class="info">
        לחצו על הכפתור למטה כדי לעבור ישירות לעמוד הרכישה.
      </div>

      <div class="button-area">
        <a class="buy-btn" href="https://b52-store.com/ar/payment/p888651369" target="_blank" rel="noopener noreferrer">
          קנו עכשיו
        </a>
      </div>

      <div class="note">
        מעבר ישיר לעמוד התשלום
      </div>
    </div>

    <div class="footer">
      כל הזכויות שמורות
    </div>
  </div>
</body>
</html>
