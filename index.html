<html lang="ar" dir="rtl">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر شوق</title>
  <style>

body{
margin:0;
font-family:'Segoe UI', Tahoma, sans-serif;
background:linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
color:white;
text-align:center;
}

header{
padding:40px 20px;
background:linear-gradient(135deg, #000, #1a1f3a);
border-bottom:2px solid rgba(255, 193, 7, .2);
}

header h1{
font-size:40px;
margin:10px 0;
color:#ffc107;
text-shadow:0 4px 15px rgba(255, 193, 7, .3);
}

header p{
color:#ccc;
}

.store-img{
width:100%;
max-height:350px;
object-fit:cover;
}

.products{
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:linear-gradient(145deg, #1e2749, #252d47);
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 32px rgba(0,0,0,.5);
transition:.3s;
border:1px solid rgba(255,255,255,.1);
position:relative;
}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(135deg, rgba(255,255,255,.05) 0%, transparent 100%);
pointer-events:none;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 12px 48px rgba(255, 193, 7, .2);
border:1px solid rgba(255, 193, 7, .3);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
display:none !important;
}

.card::after{
content:'';
display:block;
width:100%;
height:160px;
background:linear-gradient(135deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 100%);
background-size:200% 200%;
animation:shimmer 3s ease-in-out infinite;
}

@keyframes shimmer{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card h3{
margin:15px 0;
}

.btn{
display:inline-block;
margin:30px;
padding:15px 35px;
background:#25D366;
color:white;
font-size:20px;
text-decoration:none;
border-radius:10px;
transition:.3s;
}

.btn:hover{
background:#1ebe5d;
}

.price{
color:#ffc107;
font-size:20px;
font-weight:bold;
margin:10px 0;
text-shadow:0 2px 8px rgba(255, 193, 7, .3);
}

.quantity-control{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:10px 0;
}

.qty-btn{
background:#333;
border:none;
color:white;
width:30px;
height:30px;
border-radius:5px;
cursor:pointer;
transition:.2s;
}

.qty-btn:hover{
background:#444;
}

.add-to-cart{
background:linear-gradient(135deg, #ffc107, #ffb300);
border:none;
color:#000;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
transition:.3s;
margin-bottom:10px;
width:90%;
font-weight:bold;
box-shadow:0 4px 15px rgba(255, 193, 7, .3);
}

.add-to-cart:hover{
background:linear-gradient(135deg, #ffb300, #ff9800);
transform:scale(1.05);
box-shadow:0 6px 20px rgba(255, 193, 7, .5);
}

.cart-section{
margin:30px 20px;
padding:20px;
background:linear-gradient(145deg, #1e2749, #252d47);
border-radius:15px;
max-width:900px;
margin-left:auto;
margin-right:auto;
border:1px solid rgba(255, 193, 7, .2);
box-shadow:0 8px 32px rgba(0,0,0,.5);
}

.cart-items{
text-align:right;
margin:15px 0;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(255, 193, 7, .05);
margin:5px 0;
border-radius:8px;
border-left:3px solid #ffc107;
}

.cart-total{
font-size:18px;
font-weight:bold;
color:#ffc107;
margin:15px 0;
padding:15px;
border-top:2px solid rgba(255, 193, 7, .3);
text-shadow:0 2px 8px rgba(255, 193, 7, .2);
}

.order-btn{
background:linear-gradient(135deg, #ffc107, #ffb300);
width:100%;
padding:15px;
border:none;
color:#000;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-weight:bold;
box-shadow:0 4px 15px rgba(255, 193, 7, .3);
}

.order-btn:hover{
background:linear-gradient(135deg, #ffb300, #ff9800);
transform:scale(1.02);
box-shadow:0 6px 20px rgba(255, 193, 7, .5);
}

.empty-cart{
color:#aaa;
padding:20px;
}

footer{
padding:20px;
color:#aaa;
}

</style>

  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>

 </head>
 <body>
  <header>
   <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:10px;">
    <svg width="50" height="50" viewbox="0 0 50 50" style="filter: drop-shadow(0 2px 8px rgba(255, 193, 7, .4));">
     <circle cx="25" cy="25" r="24" fill="none" stroke="#ffc107" stroke-width="2" /> <path d="M 25 8 Q 15 15 15 25 Q 15 35 25 40 Q 35 35 35 25 Q 35 15 25 8" fill="#ffc107" opacity="0.3" /> <path d="M 20 28 Q 22 30 25 31 Q 28 30 30 28" stroke="#ffc107" stroke-width="2" fill="none" /> <circle cx="22" cy="24" r="1.5" fill="#ffc107" /> <circle cx="28" cy="24" r="1.5" fill="#ffc107" />
    </svg>
    <h1>حلا شوق</h1>
   </div>
   <p>حلويات فاخرة للمناسبات</p>
  </header>
  <section class="products">
   <h2>منتجاتنا</h2>
   <div class="grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&amp;h=300&amp;fit=crop" alt="هريسة" loading="lazy">
     <h3>هريسة</h3>
     <p class="price">50 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('haresa', -1)">−</button> <span id="qty-haresa">1</span> <button class="qty-btn" onclick="updateQty('haresa', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('هريسة', 50, 'haresa')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1599599810694-b5ac4dd0b7a0?w=400&amp;h=300&amp;fit=crop" alt="رز بحليب" loading="lazy">
     <h3>رز بحليب</h3>
     <p class="price">45 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('roz', -1)">−</button> <span id="qty-roz">1</span> <button class="qty-btn" onclick="updateQty('roz', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('رز بحليب', 45, 'roz')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1585080500935-71b51c63ed39?w=400&amp;h=300&amp;fit=crop" alt="معمول" loading="lazy">
     <h3>معمول</h3>
     <p class="price">60 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('ma3mul', -1)">−</button> <span id="qty-ma3mul">1</span> <button class="qty-btn" onclick="updateQty('ma3mul', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('معمول', 60, 'ma3mul')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=400&amp;h=300&amp;fit=crop" alt="بوكس حلويات" loading="lazy">
     <h3>بوكس حلويات</h3>
     <p class="price">120 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('box', -1)">−</button> <span id="qty-box">1</span> <button class="qty-btn" onclick="updateQty('box', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('بوكس حلويات', 120, 'box')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1599599810694-b5ac4dd0b7a0?w=400&amp;h=300&amp;fit=crop" alt="هريسة صغيرة" loading="lazy">
     <h3>هريسة صغيرة</h3>
     <p class="price">15 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('haresa-small', -1)">−</button> <span id="qty-haresa-small">1</span> <button class="qty-btn" onclick="updateQty('haresa-small', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('هريسة صغيرة', 15, 'haresa-small')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1599599810694-b5ac4dd0b7a0?w=400&amp;h=300&amp;fit=crop" alt="رز بحليب صغير" loading="lazy">
     <h3>رز بحليب صغير</h3>
     <p class="price">12 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('roz-small', -1)">−</button> <span id="qty-roz-small">1</span> <button class="qty-btn" onclick="updateQty('roz-small', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('رز بحليب صغير', 12, 'roz-small')">أضف للسلة</button>
    </div>
    <div class="card"><img src="https://images.unsplash.com/photo-1585080500935-71b51c63ed39?w=400&amp;h=300&amp;fit=crop" alt="معمول صغير" loading="lazy">
     <h3>معمول صغير</h3>
     <p class="price">18 ريال</p>
     <div class="quantity-control"><button class="qty-btn" onclick="updateQty('ma3mul-small', -1)">−</button> <span id="qty-ma3mul-small">1</span> <button class="qty-btn" onclick="updateQty('ma3mul-small', 1)">+</button>
     </div><button class="add-to-cart" onclick="addToCart('معمول صغير', 18, 'ma3mul-small')">أضف للسلة</button>
    </div>
   </div>
   <div class="cart-section">
    <h2>🛒 سلة التسوق</h2>
    <div id="cart-items" class="cart-items">
     <p class="empty-cart">السلة فارغة</p>
    </div>
    <div class="cart-total">
     الإجمالي: <span id="total">0</span> ريال
    </div>
    <div style="display:flex; gap:10px; margin-top:15px;"><button class="order-btn" onclick="sendOrder()" id="order-btn" style="display:none; flex:1;"> إرسال الطلب عبر واتساب </button> <button class="order-btn" id="whatsapp-btn" style="display:none; flex:1; background:linear-gradient(135deg, #25D366, #1ebe5d);" onclick="sendWhatsappMessage()"> إرسال استفسار عبر واتساب </button>
    </div>
   </div>
  </section>
  <footer>
   © متجر شوق
  </footer>
  <script>
    let cart = {};
    let quantities = {
      haresa: 1,
      roz: 1,
      ma3mul: 1,
      box: 1,
      'haresa-small': 1,
      'roz-small': 1,
      'ma3mul-small': 1
    };

    function updateQty(product, change) {
      quantities[product] += change;
      if (quantities[product] < 1) quantities[product] = 1;
      document.getElementById('qty-' + product).textContent = quantities[product];
    }

    function addToCart(name, price, id) {
      const qty = quantities[id];
      if (cart[id]) {
        cart[id].qty += qty;
      } else {
        cart[id] = { name, price, qty };
      }
      quantities[id] = 1;
      document.getElementById('qty-' + id).textContent = '1';
      updateCartDisplay();
    }

    function updateCartDisplay() {
      const cartItems = document.getElementById('cart-items');
      const total = document.getElementById('total');
      const orderBtn = document.getElementById('order-btn');

      if (Object.keys(cart).length === 0) {
        cartItems.innerHTML = '<p class="empty-cart">السلة فارغة</p>';
        total.textContent = '0';
        orderBtn.style.display = 'none';
        return;
      }

      let html = '';
      let totalPrice = 0;

      for (let id in cart) {
        const item = cart[id];
        const itemTotal = item.price * item.qty;
        totalPrice += itemTotal;
        html += `
          <div class="cart-item">
            <button onclick="removeFromCart('${id}')" style="background:#d32f2f; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold;">🗑️ حذف</button>
            <span>${item.qty} × ${item.price} ريال = ${itemTotal} ريال</span>
            <span>${item.name}</span>
          </div>
        `;
      }

      cartItems.innerHTML = html;
      total.textContent = totalPrice;
      orderBtn.style.display = 'block';
      document.getElementById('whatsapp-btn').style.display = 'block';
    }

    function removeFromCart(id) {
      delete cart[id];
      updateCartDisplay();
    }

    function sendOrder() {
      let message = 'طلبي من متجر شوق:%0A%0A';
      let total = 0;

      for (let id in cart) {
        const item = cart[id];
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        message += `${item.name} - ${item.qty} × ${item.price} ريال = ${itemTotal} ريال%0A`;
      }

      message += `%0A----%0Aالإجمالي: ${total} ريال`;
      window.open(`https://wa.me/966533175212?text=${message}`);
    }

    function sendWhatsappMessage() {
      let message = 'السلام عليكم ورحمة الله وبركاته%0Aأود الاستفسار عن:%0A%0A';
      let total = 0;

      for (let id in cart) {
        const item = cart[id];
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        message += `${item.name} - ${item.qty} × ${item.price} ريال = ${itemTotal} ريال%0A`;
      }

      message += `%0A----%0Aالإجمالي: ${total} ريال`;
      window.open(`https://wa.me/966533175212?text=${message}`);
    }
  </script>
