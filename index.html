<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعليم لغة الإشارة</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    background:#f4f4f4;
    text-align:center;
}

header{
    background:#2c3e50;
    color:white;
    padding:20px;
}

nav a{
    margin:10px;
    text-decoration:none;
    font-size:18px;
}

.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px 20px;
    font-size:16px;
}
</style>
</head>

<body>

<header>
<h1>تعليم لغة الإشارة</h1>
<nav>
<a href="#">الرئيسية</a>
<a href="#">شراء 99</a>
<a href="#">مجانا</a>
<a href="#">التعليم</a>
</nav>
</header>

<div class="card">
<h2>اسم الإيدي: السلام عليكم</h2>
<p>تعلم الإشارة بالفيديو</p>
<button onclick="playVideo('salam')">اضغط هنا</button>

<div id="salam"></div>
</div>

<div class="card">
<h2>كيفك</h2>
<button onclick="playVideo('kaifak')">اضغط هنا</button>
<div id="kaifak"></div>
</div>

<div class="card">
<h2>تمام</h2>
<button onclick="playVideo('tamam')">اضغط هنا</button>
<div id="tamam"></div>
</div>

<div class="card">
<h2>وين</h2>
<button onclick="playVideo('wain')">اضغط هنا</button>
<div id="wain"></div>
</div>

<h2>HTML Editor</h2>
<textarea id="editor" rows="10" cols="60"></textarea>
<br>
<button onclick="runCode()">تشغيل الكود</button>

<div id="result"></div>

<script>
function playVideo(id){
document.getElementById(id).innerHTML =
'<video width="300" controls><source src="video.mp4" type="video/mp4"></video>';
}

function runCode(){
var code = document.getElementById("editor").value;
document.getElementById("result").innerHTML = code;
}
</script>

</body>
</html>
