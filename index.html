<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر أحمد المرضي العنزي الرقمي للصم</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#1e3a8a;
padding:25px;
}

.container{
padding:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.price{
font-size:22px;
color:#60a5fa;
margin:10px;
}

button{
background:#3b82f6;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>متجر أحمد المرضي العنزي الرقمي للصم</h1>
</header>

<div class="container">

<h2>المنتجات</h2>

<div class="products">

<div class="card">
<h3>إضافة شاهد</h3>
<div class="price">8 ﷼</div>
<button>اطلب الآن</button>
</div>

<div class="card">
<h3>إضافة نتفلكس</h3>
<div class="price">18 ﷼</div>
<button>اطلب الآن</button>
</div>

<div class="card">
<h3>تطبيقات البلس سنة</h3>
<div class="price">45 ﷼</div>
<button>اطلب الآن</button>
</div>

<div class="card">
<h3>سناب شات بلس الرسمي 3 أشهر</h3>
<div class="price">24 ﷼</div>
<button>اطلب الآن</button>
</div>

<div class="card">
<h3>سناب شات بلس الرسمي 6 أشهر</h3>
<div class="price">39 ﷼</div>
<button>اطلب الآن</button>
</div>

</div>
</div>

</body>
</html>
