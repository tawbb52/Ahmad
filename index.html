<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كأس العالم - البث المباشر</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: gold;
}

.container {
  display: flex;
  flex-wrap: wrap;
}

.channels {
  width: 30%;
  min-width: 250px;
  background: #111827;
  height: 100vh;
  overflow-y: auto;
}

.channel {
  padding: 15px;
  border-bottom: 1px solid #222;
  cursor: pointer;
}

.channel:hover {
  background: #1f2937;
}

.player {
  flex: 1;
  padding: 20px;
}

video {
  width: 100%;
  border-radius: 12px;
  background: black;
}

.title {
  margin-bottom: 10px;
  color: #22c55e;
}
</style>
</head>

<body>

<header>⚽ كأس العالم - البث المباشر</header>

<div class="container">

  <!-- القنوات -->
  <div class="channels">
    <div class="channel" onclick="play('STREAM_URL_1')">قناة 1 - مباراة 1</div>
    <div class="channel" onclick="play('STREAM_URL_2')">قناة 2 - مباراة 2</div>
    <div class="channel" onclick="play('STREAM_URL_3')">قناة 3 - مباراة 3</div>
    <div class="channel" onclick="play('STREAM_URL_4')">قناة 4 - مباراة 4</div>
  </div>

  <!-- المشغل -->
  <div class="player">
    <div class="title">🎬 اختر قناة للمشاهدة</div>
    <video id="video" controls autoplay></video>
  </div>

</div>

<script>
function play(url) {
  const video = document.getElementById("video");
  video.src = url;
  video.play();
}
</script>

</body>
</html>
