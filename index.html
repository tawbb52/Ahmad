<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر أحمد الرقمي للصم</title>

<style>
body{
font-family: Arial;
direction: rtl;
text-align:center;
background:#f4f4f4;
}

.box{
background:white;
width:85%;
max-width:500px;
margin:80px auto;
padding:30px;
border-radius:15px;
}

select, input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>متجر أحمد الرقمي للصم</h2>

<input type="text" id="name" placeholder="اكتب اسمك">

<select id="product">
<option value="اشتراك تطبيقات بلس - 45 ريال">اشتراك تطبيقات بلس - 45 ريال</option>
<option value="اشتراك شاهد VIP مسلسلات - 8 ريال">اشتراك شاهد VIP مسلسلات - 8 ريال</option>
<option value="اشتراك نتفلكس ملف خاص - 18 ريال">اشتراك نتفلكس ملف خاص - 18 ريال</option>
</select>

<button onclick="sendWhats()">اشتراك عبر واتساب</button>

</div>

<script>
function sendWhats(){

var name = document.getElementById("name").value;
var product = document.getElementById("product").value;

var phone = "966504106065"; 

var message = "مرحبا، اسمي " + name + " أريد " + product;

var url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

window.open(url);
}
</script>

</body>
</html>
