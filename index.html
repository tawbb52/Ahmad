<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  padding:15px;
  text-align:center;
  background:#111827;
  color:gold;
  font-weight:bold;
}

.container{
  display:flex;
  height:100vh;
}

.list{
  width:30%;
  background:#111827;
  overflow:auto;
}

.item{
  padding:15px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.item:hover{
  background:#1f2937;
}

.player{
  flex:1;
  padding:10px;
}

video{
  width:100%;
  border-radius:10px;
  background:black;
}
</style>
</head>

<body>

<header>⚽ IPTV قنوات مباشرة</header>

<div class="container">

  <div class="list">
    <div class="item" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">قناة 1</div>
    <div class="item" onclick="play('https://test-streams.mux.dev/test.m3u8')">قناة 2</div>
  </div>

  <div class="player">
    <video id="video" controls autoplay></video>
  </div>

</div>

<script>
function play(url){
  document.getElementById("video").src = url;
}
</script>

</body>
</html>
