<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Login</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b0f19;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:90%;
  max-width:400px;
  text-align:center;
}

.logo{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.subtitle{
  color:#9ca3af;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  outline:none;
}

input::placeholder{
  color:#9ca3af;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#facc15;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{
  background:#eab308;
}
</style>

</head>

<body>

<div class="box">

  <!-- الشعار -->
  <div class="logo">📺 شعار</div>

  <!-- العنوان -->
  <div class="subtitle">إضافة قائمة تشغيل</div>

  <!-- الحقول -->
  <input type="text" placeholder="اسم المستخدم">
  <input type="password" placeholder="كلمة المرور">
  <input type="text" placeholder="السيرفر">
  <input type="text" placeholder="الخادم">

  <!-- الزر -->
  <button class="btn">ابدأ ▶</button>

</div>

</body>
</html>
