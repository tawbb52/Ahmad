<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Login</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b0f19;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:90%;
  max-width:400px;
  text-align:center;
}

.logo{
  font-size:28px;
  font-weight:bold;
  margin-bottom:15px;
}

.subtitle{
  color:#9ca3af;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  outline:none;
}

input::placeholder{
  color:#9ca3af;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#facc15;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{
  background:#eab308;
}

/* رسالة خطأ */
.error{
  color:red;
  font-size:13px;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<div class="box">

  <!-- الشعار -->
  <div class="logo">📺 IPTV</div>

  <!-- العنوان -->
  <div class="subtitle">تسجيل الدخول</div>

  <!-- الحقول -->
  <input id="user" type="text" placeholder="اسم المستخدم">
  <input id="pass" type="password" placeholder="كلمة المرور">

  <!-- الزر -->
  <button class="btn" onclick="login()">ابدأ ▶</button>

  <div class="error" id="error">خطأ في البيانات</div>

</div>

<script>
const server = "http://barq-tv.site:80";

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  // مثال ربط (API وهمي)
  fetch(server + "/player_api.php?username=" + u + "&password=" + p)
  .then(res => res.json())
  .then(data => {
    if(data.user_info){
      alert("تم الدخول بنجاح");
      window.location.href = "channels.html";
    } else {
      document.getElementById("error").style.display = "block";
    }
  })
  .catch(err => {
    document.getElementById("error").style.display = "block";
  });
}
</script>

</body>
</html>
