<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر أحمد الرقمي للصم</title>

<style>
body{
font-family: Arial;
direction: rtl;
text-align:center;
background:#f3f3f3;
}

.container{
width:90%;
max-width:900px;
margin:auto;
}

.product{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
max-width:300px;
border-radius:10px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>متجر أحمد الرقمي للصم</h1>

<input type="text" id="name" placeholder="اكتب اسمك">

<div class="container">

<div class="product">
<img src="https://i.imgur.com/Fz7ZxYp.png">
<h3>اشتراك تطبيقات بلس</h3>
<p>السعر: 45 ريال</p>
<button onclick="order('اشتراك تطبيقات بلس - 45 ريال')">اطلب عبر واتساب</button>
</div>

<div class="product">
<img src="https://i.imgur.com/9XqQK7F.png">
<h3>اشتراك شاهد VIP مسلسلات</h3>
<p>السعر: 8 ريال</p>
<button onclick="order('اشتراك شاهد VIP مسلسلات - 8 ريال')">اطلب عبر واتساب</button>
</div>

<div class="product">
<img src="https://i.imgur.com/6Z8Y2zU.png">
<h3>اشتراك نتفلكس ملف خاص</h3>
<p>السعر: 18 ريال</p>
<button onclick="order('اشتراك نتفلكس ملف خاص - 18 ريال')">اطلب عبر واتساب</button>
</div>

</div>

<script>
function order(product){

var name=document.getElementById("name").value;
var phone="966XXXXXXXXX";

var text="مرحبا اسمي "+name+" أريد "+product;

var url="https://wa.me/"+phone+"?text="+encodeURIComponent(text);

window.open(url);
}
</script>

</body>
</html>
