<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ahmad Admin | تسجيل الدخول</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .login-body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      .login-panel { max-width: 400px; margin: 50px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
      .login-panel h1 { text-align: center; margin-bottom: 10px; color: #333; }
      .login-panel .muted { text-align: center; color: #999; margin-bottom: 20px; }
      .hero-note { background: #f0f7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-right: 4px solid #667eea; }
      .hero-note strong { color: #667eea; }
      .login-panel label { display: block; margin-bottom: 15px; }
      .login-panel label input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
      .login-panel input:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
      .btn-primary { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
      .btn-primary:hover { background: #5568d3; }
      #loginStatus { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; }
      #loginStatus.error { background: #ffe6e6; color: #d63031; }
      #loginStatus.success { background: #e6ffe6; color: #00b894; }
      .mobile-host-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; }
      .mobile-host-input { width: 100%; padding: 10px; font-size: 14px; }
      .mobile-help { font-size: 12px; color: #999; margin-top: 10px; text-align: center; }
    </style>
  </head>
  <body class="login-body" data-page="login">
    <section class="login-panel">
      <h1>🔐 Ahmad Admin</h1>
      <p class="muted">نظام إدارة متقدم لتطبيقات iOS</p>
      
      <div class="hero-note">
        <strong>🎯 بيانات الاختبار:</strong><br>
        البريد: <strong>admin@ahmad.local</strong><br>
        كلمة المرور: <strong>Admin123!</strong>
      </div>

      <form id="loginForm">
        <label>
          📧 البريد الإلكتروني
          <input type="email" name="email" value="admin@ahmad.local" required autocomplete="email" />
        </label>
        <label>
          🔒 كلمة المرور
          <input type="password" name="password" value="Admin123!" required autocomplete="current-password" />
        </label>
        <button class="btn-primary" type="submit">دخول</button>
      </form>

      <div id="loginStatus" class="muted"></div>

      <!-- للجوال: إدخال عنوان السيرفر المخصص -->
      <div class="mobile-host-section">
        <label>
          📱 عنوان السيرفر (للجوال)
          <input type="text" id="mobileHost" class="mobile-host-input" placeholder="مثال: 192.168.1.100" />
        </label>
        <p class="mobile-help">أدخل IP الجهاز إذا كان الاتصال من جوال على شبكة مختلفة</p>
        <button type="button" class="btn-primary" id="saveHostBtn" style="background: #888;">حفظ العنوان</button>
      </div>
    </section>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
      // للجوال: حفظ عنوان السيرفر
      document.getElementById("saveHostBtn")?.addEventListener("click", () => {
        const host = document.getElementById("mobileHost").value;
        if (host) {
          window.api.setHostForMobile(host);
          alert("✅ تم حفظ العنوان بنجاح!");
        } else {
          alert("⚠️ الرجاء إدخال عنوان السيرفر");
        }
      });

      // تحميل العنوان المحفوظ
      const savedHost = localStorage.getItem("ahmad-api-host");
      if (savedHost) {
        document.getElementById("mobileHost").value = savedHost;
      }
    </script>
  </body>
</html>
