version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: dev-certs-udid-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dev-certs-udid
    volumes:
      - mongodb_data:/data/db
    networks:
      - dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev-certs-udid-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/dev-certs-udid
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_refresh_secret_key_here}
    depends_on:
      - mongodb
    networks:
      - dev-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dev-certs-udid-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - dev-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  dev-network:
    driver: bridge