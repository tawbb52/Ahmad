<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع التطبيق - B52 Plus</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      
      header {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        margin-bottom: 30px;
        text-align: center;
      }
      
      header h1 {
        color: #333;
        font-size: 32px;
        margin-bottom: 10px;
      }
      
      header p {
        color: #666;
        font-size: 16px;
      }
      
      .main-content {
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        overflow: hidden;
      }
      
      .section-title {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px 30px;
        font-size: 20px;
        font-weight: bold;
      }
      
      .form-container {
        padding: 30px;
      }
      
      .form-group {
        margin-bottom: 25px;
      }
      
      label {
        display: block;
        color: #333;
        font-weight: bold;
        margin-bottom: 8px;
        font-size: 16px;
      }
      
      input[type="text"],
      input[type="number"],
      input[type="url"],
      textarea,
      select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.3s;
        direction: rtl;
      }
      
      input[type="text"]:focus,
      input[type="number"]:focus,
      input[type="url"]:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
      }
      
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      
      .file-upload {
        border: 2px dashed #667eea;
        border-radius: 8px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: background 0.3s;
      }
      
      .file-upload:hover {
        background: #f5f5ff;
      }
      
      .file-upload input[type="file"] {
        display: none;
      }
      
      .file-upload-label {
        cursor: pointer;
        display: block;
      }
      
      .upload-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      
      .upload-text {
        color: #667eea;
        font-weight: bold;
        margin-bottom: 5px;
      }
      
      .upload-subtext {
        color: #999;
        font-size: 14px;
      }
      
      .file-info {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-top: 10px;
        display: none;
      }
      
      .file-info.show {
        display: block;
      }
      
      .file-name {
        color: #333;
        font-weight: bold;
        margin-bottom: 5px;
      }
      
      .file-size {
        color: #999;
        font-size: 14px;
      }
      
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      
      .button-group {
        display: flex;
        gap: 15px;
        margin-top: 30px;
        justify-content: flex-start;
      }
      
      button {
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      
      .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      
      .btn-reset {
        background: #f0f0f0;
        color: #333;
      }
      
      .btn-reset:hover {
        background: #e0e0e0;
      }
      
      .apps-list {
        padding: 30px;
        border-top: 1px solid #f0f0f0;
      }
      
      .list-title {
        font-size: 18px;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
      }
      
      .app-item {
        background: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 15px;
        border-right: 4px solid #667eea;
      }
      
      .app-name {
        font-weight: bold;
        color: #333;
        font-size: 16px;
        margin-bottom: 8px;
      }
      
      .app-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 10px;
      }
      
      .app-detail {
        font-size: 14px;
        color: #666;
      }
      
      .app-detail strong {
        color: #333;
      }
      
      .app-url {
        word-break: break-all;
        font-size: 12px;
        color: #667eea;
        margin-top: 10px;
        background: white;
        padding: 10px;
        border-radius: 5px;
      }
      
      .action-buttons {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      
      .btn-small {
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background: #e0e0e0;
        color: #333;
      }
      
      .btn-small:hover {
        background: #d0d0d0;
      }
      
      .btn-delete {
        background: #ff6b6b;
        color: white;
      }
      
      .btn-delete:hover {
        background: #ff5252;
      }
      
      .success-message {
        background: #e8f5e9;
        color: #2e7d32;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      
      .success-message.show {
        display: block;
      }
      
      @media (max-width: 600px) {
        .form-row {
          grid-template-columns: 1fr;
        }
        
        .app-details {
          grid-template-columns: 1fr;
        }
        
        .button-group {
          flex-direction: column;
        }
        
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- رأس الصفحة -->
      <header>
        <h1>📱 رفع التطبيق</h1>
        <p>أضف إصدار جديد من تطبيق B52 Plus</p>
      </header>

      <!-- محتوى الرفع -->
      <div class="main-content">
        <div class="section-title">➕ إضافة تطبيق جديد</div>
        
        <div class="form-container">
          <div class="success-message" id="successMessage">
            ✓ تم رفع التطبيق بنجاح!
          </div>

          <form id="appForm">
            <!-- اسم التطبيق والإصدار -->
            <div class="form-row">
              <div class="form-group">
                <label for="appName">اسم التطبيق</label>
                <input type="text" id="appName" placeholder="مثال: B52 Plus" value="B52 Plus" required>
              </div>
              <div class="form-group">
                <label for="version">رقم الإصدار</label>
                <input type="text" id="version" placeholder="مثال: 1.0.1" required>
              </div>
            </div>

            <!-- معرف التطبيق وحجم الملف -->
            <div class="form-row">
              <div class="form-group">
                <label for="bundleId">معرف التطبيق</label>
                <input type="text" id="bundleId" placeholder="مثال: com.tawbb52.myapp" value="com.tawbb52.myapp" required>
              </div>
              <div class="form-group">
                <label for="fileSize">حجم الملف (MB)</label>
                <input type="number" id="fileSize" placeholder="مثال: 150" step="0.1" required>
              </div>
            </div>

            <!-- رابط الملف -->
            <div class="form-group">
              <label for="appUrl">رابط ملف .ipa</label>
              <input type="url" id="appUrl" placeholder="https://example.com/app.ipa" required>
            </div>

            <!-- وصف التحديثات -->
            <div class="form-group">
              <label for="changelog">وصف التحديثات (Changelog)</label>
              <textarea id="changelog" placeholder="• إصلاح الأخطاء&#10;• تحسين الأداء&#10;• مميزات جديدة"></textarea>
            </div>

            <!-- تاريخ الإطلاق -->
            <div class="form-group">
              <label for="releaseDate">تاريخ الإطلاق</label>
              <input type="text" id="releaseDate" placeholder="2026-06-18" value="2026-06-18">
            </div>

            <!-- الأزرار -->
            <div class="button-group">
              <button type="submit" class="btn-submit">✓ حفظ التطبيق</button>
              <button type="reset" class="btn-reset">↺ مسح النموذج</button>
            </div>
          </form>
        </div>

        <!-- قائمة التطبيقات المرفوعة -->
        <div class="apps-list">
          <div class="list-title">📦 التطبيقات المرفوعة</div>
          <div id="appsList"></div>
        </div>
      </div>
    </div>

    <script>
      // تخزين البيانات في localStorage
      const STORAGE_KEY = 'b52_apps';

      // تحميل التطبيقات عند فتح الصفحة
      function loadApps() {
        const apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const appsList = document.getElementById('appsList');
        appsList.innerHTML = '';

        if (apps.length === 0) {
          appsList.innerHTML = '<p style="color: #999; text-align: center;">لا توجد تطبيقات مرفوعة حالياً</p>';
          return;
        }

        apps.forEach((app, index) => {
          const appHTML = `
            <div class="app-item">
              <div class="app-name">${app.appName} - الإصدار ${app.version}</div>
              <div class="app-details">
                <div class="app-detail"><strong>معرف التطبيق:</strong> ${app.bundleId}</div>
                <div class="app-detail"><strong>الحجم:</strong> ${app.fileSize} MB</div>
                <div class="app-detail"><strong>التاريخ:</strong> ${app.releaseDate}</div>
              </div>
              <div class="app-url"><strong>الرابط:</strong> ${app.appUrl}</div>
              ${app.changelog ? `<div style="margin-top: 10px; color: #666; font-size: 14px;"><strong>التحديثات:</strong><br>${app.changelog.replace(/\n/g, '<br>')}</div>` : ''}
              <div class="action-buttons">
                <button class="btn-small" onclick="copyToClipboard('${app.appUrl}')">📋 نسخ الرابط</button>
                <button class="btn-small btn-delete" onclick="deleteApp(${index})">🗑️ حذف</button>
              </div>
            </div>
          `;
          appsList.innerHTML += appHTML;
        });
      }

      // إضافة تطبيق جديد
      document.getElementById('appForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newApp = {
          appName: document.getElementById('appName').value,
          version: document.getElementById('version').value,
          bundleId: document.getElementById('bundleId').value,
          fileSize: document.getElementById('fileSize').value,
          appUrl: document.getElementById('appUrl').value,
          changelog: document.getElementById('changelog').value,
          releaseDate: document.getElementById('releaseDate').value
        };

        const apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        apps.unshift(newApp);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));

        // عرض رسالة النجاح
        const successMsg = document.getElementById('successMessage');
        successMsg.classList.add('show');
        setTimeout(() => successMsg.classList.remove('show'), 3000);

        // إعادة تحميل القائمة
        loadApps();
        this.reset();
      });

      // حذف تطبيق
      function deleteApp(index) {
        if (confirm('هل تريد حذف هذا التطبيق؟')) {
          const apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
          apps.splice(index, 1);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
          loadApps();
        }
      }

      // نسخ الرابط إلى الحافظة
      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          alert('تم نسخ الرابط بنجاح!');
        });
      }

      // تحميل التطبيقات عند بدء الصفحة
      loadApps();
    </script>
  </body>
</html>
