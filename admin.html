<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div class="admin-container">
    
    <aside class="sidebar">
      <h2>لوحة التحكم</h2>
      <a href="#">الرئيسية</a>
      <a href="#">المنتجات</a>
      <a href="#">الطلبات</a>
      <a href="#">الإعدادات</a>
    </aside>

    <main class="main">
      <h1>إدارة المنتجات</h1>

      <button class="btn btn-add" onclick="showForm()">إضافة منتج</button>

      <div id="product-form" style="display:none; margin-bottom:20px;">
        <label>اسم المنتج</label>
        <input type="text" id="name" placeholder="مثال: ChatGPT Plus">

        <label>السعر</label>
        <input type="text" id="price" placeholder="مثال: 25 ر.س">

        <label>رابط الصورة</label>
        <input type="text" id="image" placeholder="ضع رابط الصورة">

        <button class="btn btn-add" onclick="addProduct()">حفظ المنتج</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>الصورة</th>
            <th>اسم المنتج</th>
            <th>السعر</th>
            <th>التحكم</th>
          </tr>
        </thead>
        <tbody id="products-table">
          <tr>
            <td><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" width="50"></td>
            <td>ChatGPT Plus</td>
            <td>25 ر.س</td>
            <td>
              <button class="btn btn-edit">تعديل</button>
              <button class="btn btn-delete" onclick="deleteRow(this)">حذف</button>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <script>
    function showForm() {
      const form = document.getElementById("product-form");
      form.style.display = form.style.display === "none" ? "block" : "none";
    }

    function addProduct() {
      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const image = document.getElementById("image").value;

      if (!name || !price || !image) {
        alert("أكمل جميع الحقول");
        return;
      }

      const table = document.getElementById("products-table");
      const row = document.createElement("tr");

      row.innerHTML = `
        <td><img src="${image}" width="50"></td>
        <td>${name}</td>
        <td>${price}</td>
        <td>
          <button class="btn btn-edit">تعديل</button>
          <button class="btn btn-delete" onclick="deleteRow(this)">حذف</button>
        </td>
      `;

      table.appendChild(row);

      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("image").value = "";
    }

    function deleteRow(button) {
      button.parentElement.parentElement.remove();
    }
  </script>

</body>
</html>
