<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B52 Store</title>

<style>

body{
background:#000;
font-family:Arial;
color:#fff;
margin:0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#0b0b0b;
border:2px solid #0a5c87;
border-radius:6px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:230px;
object-fit:contain;
background:#0d2c4a;
}

.title{
font-size:22px;
margin-top:15px;
}

.price{
font-size:20px;
margin:10px 0 20px;
}

.whatsapp-btn{
display:block;
background:#ffffff;
color:#e53935;
padding:14px;
text-decoration:none;
font-size:18px;
margin:0 15px 20px;
border-radius:4px;
}

.whatsapp-btn:hover{
background:#f1f1f1;
}

</style>
</head>

<body>

<div class="products">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c4/Snapchat_logo.svg">

<div class="title">
سناب شات<br>Snapchat+
</div>

<div class="price">
44 ر.س
</div>

<a class="whatsapp-btn"
href="https://wa.me/966504106065?text=السلام%20عليكم%20أرغب%20بطلب%20Snapchat%2B"
target="_blank">

اطلب واتساب

</a>

</div>


<div class="card">

<img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg">

<div class="title">
اشتراك شات جي بي تي<br>ChatGPT Plus
</div>

<div class="price">
5.99$
</div>

<a class="whatsapp-btn"
href="https://wa.me/966504106065?text=السلام%20عليكم%20أرغب%20بطلب%20ChatGPT%20Plus"
target="_blank">

اطلب واتساب

</a>

</div>

</div>

</body>
</html>
