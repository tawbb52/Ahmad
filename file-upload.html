<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع ملفات التطبيق - B52 Plus</title>
    <style>
      /* =========================
         B52 BLUE CLEAN THEME
      ========================= */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body, html {
        background: #356D9F !important;
        color: #fff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        padding: 20px;
      }
      
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      /* الشعار */
      .logo-section {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo-svg {
        width: 120px;
        height: 120px;
        margin: 0 auto 20px;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
      }
      
      /* رأس الصفحة */
      header {
        background: #3B75A8 !important;
        padding: 40px;
        border-radius: 35px !important;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
        margin-bottom: 30px;
        text-align: center;
        border: none !important;
      }
      
      header h1 {
        color: #fff !important;
        font-size: 36px;
        margin-bottom: 10px;
      }
      
      header p {
        color: rgba(255, 255, 255, 0.8) !important;
        font-size: 16px;
      }
      
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 30px;
      }
      
      /* البطاقات */
      .card {
        background: #3B75A8 !important;
        border: none !important;
        outline: none !important;
        border-radius: 35px !important;
        box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.15), 0 5px 15px rgba(0, 0, 0, 0.25) !important;
        overflow: hidden;
      }
      
      .card::before,
      .card::after {
        display: none !important;
        content: none !important;
      }
      
      .card-header {
        background: linear-gradient(to bottom, #5AA4E6 0%, #4187C7 50%, #2E6EA6 100%);
        color: #fff !important;
        padding: 20px 30px;
        font-size: 18px;
        font-weight: bold;
        border: none !important;
      }
      
      .card-body {
        padding: 30px;
      }
      
      .form-group {
        margin-bottom: 20px;
      }
      
      label {
        display: block;
        color: #fff !important;
        font-weight: bold;
        margin-bottom: 8px;
        font-size: 14px;
      }
      
      /* الحقول النصية */
      input[type="text"],
      input[type="email"],
      input[type="number"],
      input[type="url"],
      textarea,
      select {
        width: 100%;
        padding: 12px 15px;
        background: #2E5A7F !important;
        color: #fff !important;
        border: none !important;
        outline: none !important;
        border-radius: 25px !important;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.3s;
      }
      
      input::placeholder,
      textarea::placeholder {
        color: rgba(255, 255, 255, 0.6) !important;
      }
      
      input:focus,
      textarea:focus,
      select:focus {
        background: #3B75A8 !important;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2) !important;
      }
      
      textarea {
        resize: vertical;
        min-height: 80px;
      }
      
      /* منطقة رفع الملفات */
      .file-upload-area {
        border: 2px dashed #5AA4E6;
        border-radius: 25px !important;
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: rgba(90, 164, 230, 0.1);
      }
      
      .file-upload-area:hover {
        background: rgba(90, 164, 230, 0.2);
        border-color: #4187C7;
        box-shadow: 0 0 20px rgba(90, 164, 230, 0.3);
      }
      
      .file-upload-area.dragover {
        background: rgba(90, 164, 230, 0.25);
        border-color: #2E6EA6;
        box-shadow: 0 0 20px rgba(90, 164, 230, 0.4);
      }
      
      .file-upload-area input[type="file"] {
        display: none;
      }
      
      .upload-icon {
        font-size: 50px;
        margin-bottom: 15px;
      }
      
      .upload-text {
        color: #5AA4E6;
        font-weight: bold;
        font-size: 16px;
        margin-bottom: 5px;
      }
      
      .upload-subtext {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
      }
      
      .file-info {
        background: rgba(76, 175, 80, 0.2);
        color: #7dff7d;
        padding: 15px;
        border-radius: 15px !important;
        margin-top: 10px;
        display: none;
        border: 1px solid rgba(76, 175, 80, 0.4);
      }
      
      .file-info.show {
        display: block;
      }
      
      /* الأزرار */
      button {
        border: none !important;
        border-radius: 25px !important;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }
      
      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      
      .btn-submit {
        flex: 1;
        padding: 12px 20px;
        background: linear-gradient(to bottom, #5AA4E6 0%, #4187C7 50%, #2E6EA6 100%) !important;
        color: #fff !important;
        box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.15), 0 5px 15px rgba(0, 0, 0, 0.25) !important;
      }
      
      .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.2), 0 8px 20px rgba(0, 0, 0, 0.35) !important;
      }
      
      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      
      .btn-reset {
        flex: 1;
        padding: 12px 20px;
        background: #2E5A7F !important;
        color: #fff !important;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25) !important;
      }
      
      .btn-reset:hover {
        background: #3B75A8 !important;
      }
      
      /* عناصر الملفات */
      .file-item {
        background: #2E5A7F !important;
        padding: 15px;
        border-radius: 15px !important;
        margin-bottom: 10px;
        border-right: 4px solid #5AA4E6;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: none !important;
      }
      
      .file-details {
        flex: 1;
      }
      
      .file-name {
        font-weight: bold;
        color: #fff !important;
        margin-bottom: 5px;
      }
      
      .file-meta {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
      }
      
      .file-actions {
        display: flex;
        gap: 8px;
      }
      
      .btn-action {
        padding: 6px 12px;
        font-size: 12px;
        background: #3B75A8 !important;
        color: #fff !important;
        border: none !important;
        border-radius: 15px !important;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .btn-action:hover {
        background: #4187C7 !important;
      }
      
      .btn-delete {
        background: #c62828 !important;
        color: #fff !important;
      }
      
      .btn-delete:hover {
        background: #b71c1c !important;
      }
      
      /* الرسائل */
      .message {
        padding: 15px;
        border-radius: 15px !important;
        margin-bottom: 20px;
        display: none;
        border: none !important;
      }
      
      .message.show {
        display: block;
      }
      
      .message.success {
        background: rgba(76, 175, 80, 0.2);
        color: #7dff7d;
        border: 1px solid rgba(76, 175, 80, 0.4);
      }
      
      .message.error {
        background: rgba(244, 67, 54, 0.2);
        color: #ff7d7d;
        border: 1px solid rgba(244, 67, 54, 0.4);
      }
      
      /* صندوق المعلومات */
      .info-box {
        background: rgba(90, 164, 230, 0.15);
        border-left: 4px solid #5AA4E6;
        padding: 15px;
        border-radius: 15px !important;
        margin-bottom: 20px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(90, 164, 230, 0.3);
      }
      
      .info-box strong {
        color: #5AA4E6;
      }
      
      .full-width {
        grid-column: 1 / -1;
      }
      
      .empty-state {
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        padding: 30px 20px;
      }
      
      /* شريط التمرير */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-thumb {
        background: #5AA4E6;
        border-radius: 20px;
      }

      ::-webkit-scrollbar-track {
        background: #356D9F;
      }
      
      /* الصور والأيقونات */
      img {
        border-radius: 22px !important;
      }

      .icon, svg, i {
        color: #fff !important;
      }
      
      /* وسائط الاستجابة */
      @media (max-width: 768px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
        
        .button-group {
          flex-direction: column;
        }
        
        button {
          width: 100%;
        }
        
        header {
          padding: 30px 20px;
        }
        
        header h1 {
          font-size: 24px;
        }

        .logo-svg {
          width: 90px;
          height: 90px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- الشعار -->
      <div class="logo-section">
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- دائرة خارجية -->
          <circle cx="100" cy="100" r="95" fill="none" stroke="#5AA4E6" stroke-width="3"/>
          
          <!-- دائرة داخلية -->
          <circle cx="100" cy="100" r="85" fill="rgba(90, 164, 230, 0.1)" stroke="#4187C7" stroke-width="2"/>
          
          <!-- حرف B -->
          <text x="50" y="125" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#5AA4E6">B</text>
          
          <!-- حرف 5 -->
          <text x="100" y="125" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#7dff7d">5</text>
          
          <!-- حرف 2 -->
          <text x="145" y="125" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#5AA4E6">2</text>
          
          <!-- علامة Plus -->
          <g transform="translate(100, 165)">
            <line x1="-8" y1="0" x2="8" y2="0" stroke="#5AA4E6" stroke-width="2" stroke-linecap="round"/>
            <line x1="0" y1="-8" x2="0" y2="8" stroke="#5AA4E6" stroke-width="2" stroke-linecap="round"/>
          </g>
          
          <!-- ديكور علوي -->
          <circle cx="100" cy="20" r="4" fill="#5AA4E6"/>
          <circle cx="70" cy="35" r="3" fill="#7dff7d"/>
          <circle cx="130" cy="35" r="3" fill="#7dff7d"/>
        </svg>
      </div>

      <header>
        <h1>📱 رفع ملفات التطبيق</h1>
        <p>ارفع ملفات .ipa الخاصة بتطبيق B52 Plus</p>
      </header>

      <div class="main-grid">
        <div class="card">
          <div class="card-header">📤 رفع ملف جديد</div>
          <div class="card-body">
            <div id="successMessage" class="message success"></div>
            <div id="errorMessage" class="message error"></div>

            <div class="info-box">
              <strong>💡 ملاحظة:</strong> يمكنك رفع ملفات .ipa بحجم يصل إلى 500 MB
            </div>

            <form id="fileForm">
              <div class="form-group">
                <label>ملف التطبيق (.ipa)</label>
                <div class="file-upload-area" id="fileUploadArea">
                  <div class="upload-icon">📁</div>
                  <div class="upload-text">اسحب الملف هنا أو اضغط للاختيار</div>
                  <div class="upload-subtext">الملف المدعوم: .ipa (الحد الأقصى 500 MB)</div>
                  <input type="file" id="fileInput" accept=".ipa" required>
                </div>
                <div id="fileInfo" class="file-info"></div>
              </div>

              <div class="button-group">
                <button type="submit" class="btn-submit">✓ رفع الملف</button>
                <button type="reset" class="btn-reset">↺ مسح</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header">ℹ️ معلومات التطبيق</div>
          <div class="card-body">
            <div class="form-group">
              <label>اسم التطبيق</label>
              <input type="text" value="B52 Plus" readonly>
            </div>

            <div class="form-group">
              <label>نوع الملف</label>
              <input type="text" value="iOS App Archive (.ipa)" readonly>
            </div>

            <div class="form-group">
              <label>نظام التشغيل</label>
              <input type="text" value="iOS 12.0 فما فوق" readonly>
            </div>
          </div>
        </div>

        <div class="card full-width">
          <div class="card-header">📦 الملفات المرفوعة</div>
          <div class="card-body">
            <div id="filesList"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = 'b52_uploaded_files';
      const MAX_FILE_SIZE = 500 * 1024 * 1024;

      function loadFiles() {
        const files = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const filesList = document.getElementById('filesList');
        filesList.innerHTML = '';

        if (files.length === 0) {
          filesList.innerHTML = '<div class="empty-state">لا توجد ملفات مرفوعة حالياً</div>';
          return;
        }

        files.forEach((file, index) => {
          const fileHTML = `
            <div class="file-item">
              <div class="file-details">
                <div class="file-name">📱 ${file.fileName}</div>
                <div class="file-meta">الحجم: ${(file.size / 1024 / 1024).toFixed(2)} MB | التاريخ: ${new Date(file.uploadDate).toLocaleDateString('ar-SA')}</div>
              </div>
              <div class="file-actions">
                <button class="btn-action" onclick="deleteFile(${index})">🗑️ حذف</button>
              </div>
            </div>
          `;
          filesList.innerHTML += fileHTML;
        });
      }

      const fileUploadArea = document.getElementById('fileUploadArea');
      const fileInput = document.getElementById('fileInput');
      const form = document.getElementById('fileForm');

      fileUploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        fileUploadArea.classList.add('dragover');
      });

      fileUploadArea.addEventListener('dragleave', () => {
        fileUploadArea.classList.remove('dragover');
      });

      fileUploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        fileUploadArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          fileInput.files = files;
          showFileInfo(files[0]);
        }
      });

      fileUploadArea.addEventListener('click', () => {
        fileInput.click();
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          showFileInfo(e.target.files[0]);
        }
      });

      function showFileInfo(file) {
        const fileInfo = document.getElementById('fileInfo');
        const sizeInMB = (file.size / 1024 / 1024).toFixed(2);

        if (!file.name.endsWith('.ipa')) {
          showMessage('errorMessage', '❌ خطأ: الملف يجب أن يكون من نوع .ipa');
          fileInput.value = '';
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          showMessage('errorMessage', '❌ خطأ: حجم الملف يتجاوز 500 MB');
          fileInput.value = '';
          return;
        }

        fileInfo.innerHTML = `✓ ${file.name} (${sizeInMB} MB)`;
        fileInfo.classList.add('show');
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const file = fileInput.files[0];
        if (!file) {
          showMessage('errorMessage', '❌ الرجاء اختيار ملف');
          return;
        }

        const newFile = {
          fileName: file.name,
          size: file.size,
          uploadDate: new Date().toISOString()
        };

        const files = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        files.unshift(newFile);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(files));

        showMessage('successMessage', '✓ تم رفع الملف بنجاح!');
        loadFiles();
        form.reset();
        document.getElementById('fileInfo').classList.remove('show');
      });

      function deleteFile(index) {
        if (confirm('هل تريد حذف هذا الملف؟')) {
          const files = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
          files.splice(index, 1);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
          loadFiles();
        }
      }

      function showMessage(elementId, message) {
        const element = document.getElementById(elementId);
        element.textContent = message;
        element.classList.add('show');
        setTimeout(() => element.classList.remove('show'), 3000);
      }

      loadFiles();
    </script>
  </body>
</html>
